<body class="is-day">
<div class="mode-switch">
  <button class="mode-btn active" data-mode="day">☀️ 昼（ランチ）</button>
  <button class="mode-btn" data-mode="night">🌙 夜（飲み）</button>
  <button class="mode-btn" data-mode="search">🔍 探す</button>
</div>
<div id="app-day" class="app-pane"></div>
<div id="app-night" class="app-pane" style="display:none"></div>
<div id="app-search" class="app-pane" style="display:none"></div>
<script>
(function(){
  var btns=document.querySelectorAll('.mode-btn');
  var day=document.getElementById('app-day'),night=document.getElementById('app-night'),search=document.getElementById('app-search');
  btns.forEach(function(b){b.addEventListener('click',function(){
    var m=b.getAttribute('data-mode');
    btns.forEach(function(x){x.classList.remove('active');});b.classList.add('active');
    day.style.display=(m==='day')?'':'none';
    night.style.display=(m==='night')?'':'none';
    if(search)search.style.display=(m==='search')?'':'none';
    document.body.classList.remove('is-day','is-night','is-search');
    document.body.classList.add(m==='day'?'is-day':(m==='night'?'is-night':'is-search'));
    if(m==='search'&&window.__lnsRenderSearch){window.__lnsRenderSearch();}
    window.scrollTo(0,0);
  });});
})();

    if(!need.length){cb();return;}
    fetch(REAL_API+"/api/vote?ids="+encodeURIComponent(need.join(",")),{cache:"no-store"})
     .then(function(r){if(!r.ok)throw 0;return r.json();})
     .then(function(j){need.forEach(function(id){aggCache[id]=mergeLocal(id,j[id]||blankAgg());});cb();})
     .catch(function(){need.forEach(function(id){aggCache[id]=mergeLocal(id,blankAgg());});cb();});
  }
  var REAL_API=""; // same origin
  function votedMap(){return lget(VKEY,{});}
  function hasVoted(id,f){var m=votedMap();return m[id]&&m[id][f];}
  function recordVote(id,f,v){var m=votedMap();m[id]=m[id]||{};m[id][f]=v;lset(VKEY,m);
    var la=localAgg();la[id]=la[id]||blankAgg();la[id][f][v]=(la[id][f][v]||0)+1;lset(LKEY,la);}
  function vote(id,f,v,after){
    if(hasVoted(id,f))return;
    recordVote(id,f,v);
    aggCache[id]=aggCache[id]||blankAgg();aggCache[id][f][v]=(aggCache[id][f][v]||0)+1;
    after();
    fetch(REAL_API+"/api/vote",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id:id,field:f,value:v})}).catch(function(){});
  }
  function summ(ag,f){
    var o=ag[f],best="",n=-1,tot=0;for(var k in o){tot+=o[k];if(o[k]>n){n=o[k];best=k;}}
    if(tot===0)return {txt:"投稿募集中",top:""};
    var lbl=f==="smoking"?({"可":"喫煙可","分煙":"分煙","不可":"禁煙"}[best]):best;
    return {txt:lbl+" ("+tot+"票)",top:best};
  }

  // ---- UI ----
  function styleActive(btn,on){btn.classList.toggle("lns-on",on);}
  function build(){
    root.innerHTML="";
    var wrap=el("div","lns-wrap");
    // sub tabs
    var tabs=el("div","lns-tabs");
    [["lunch","🍚 ランチ"],["night","🍶 飲み"]].forEach(function(t){
      var b=el("button","lns-tab"+(state.mode===t[0]?" lns-tab-on":""),t[1]);
      b.onclick=function(){state.mode=t[0];state.genre="";state.smoke="";state.ease="";build();};
      tabs.appendChild(b);
    });
    wrap.appendChild(tabs);

    var head=el("div","lns-head","<b>お店を探す</b><span>西新宿・アイランドタワー周辺</span>");
    wrap.appendChild(head);

    // filters
    var fil=el("div","lns-fil");
    // genre select
    var genres=[];DB.forEach(function(d){if(d.modes.indexOf(state.mode)>=0)d.genres.forEach(function(g){var gm=DAYSET[g]?"lunch":"night";if(gm===state.mode&&genres.indexOf(g)<0)genres.push(g);});});
    var gsel=el("select","lns-sel");gsel.appendChild(new Option("ジャンル：すべて",""));
    genres.forEach(function(g){var o=new Option(g,g);if(g===state.genre)o.selected=true;gsel.appendChild(o);});
    gsel.onchange=function(){state.genre=gsel.value;render();};
    fil.appendChild(fieldRow("ジャンル",gsel));

    // price chips
    var prow=el("div","lns-chips");
    [[1,"¥"],[2,"¥¥"],[3,"¥¥¥"]].forEach(function(p){
      var c=el("button","lns-chip"+(state.pl[p[0]]?" lns-on":""),p[1]);
      c.onclick=function(){state.pl[p[0]]=!state.pl[p[0]];render();styleActive(c,state.pl[p[0]]);};
      prow.appendChild(c);
    });
    fil.appendChild(fieldRow("価格帯",prow));

    // rating select
    var rsel=el("select","lns-sel");
    [["0","指定なし"],["4.0","★4.0以上"],["4.3","★4.3以上"],["4.5","★4.5以上"]].forEach(function(r){var o=new Option(r[1],r[0]);if(+r[0]===state.minR)o.selected=true;rsel.appendChild(o);});
    rsel.onchange=function(){state.minR=+rsel.value;render();};
    fil.appendChild(fieldRow("レビュー",rsel));

    // distance select
    var dsel=el("select","lns-sel");
    [["0","近い順（すべて）"],["300","300m以内"],["500","500m以内"]].forEach(function(r){var o=new Option(r[1],r[0]);if(+r[0]===state.dist)o.selected=true;dsel.appendChild(o);});
    dsel.onchange=function(){state.dist=+dsel.value;render();};
    fil.appendChild(fieldRow("近さ（会社から）",dsel));

    // smoking select (crowdsourced)
    var ssel=el("select","lns-sel");
    [["","指定なし"],["可","喫煙可"],["分煙","分煙"],["不可","禁煙"]].forEach(function(r){var o=new Option(r[1],r[0]);if(r[0]===state.smoke)o.selected=true;ssel.appendChild(o);});
    ssel.onchange=function(){state.smoke=ssel.value;render();};
    fil.appendChild(fieldRow("喫煙（投稿ベース）",ssel));

    // ease select (crowdsourced)
    var esel=el("select","lns-sel");
    [["","指定なし"],["入りやすい","入りやすい"],["ふつう","ふつう"],["並ぶ","並ぶ"]].forEach(function(r){var o=new Option(r[1],r[0]);if(r[0]===state.ease)o.selected=true;esel.appendChild(o);});
    esel.onchange=function(){state.ease=esel.value;render();};
    fil.appendChild(fieldRow("入りやすさ（投稿ベース）",esel));

    wrap.appendChild(fil);

    var actions=el("div","lns-actions");
    var rnd=el("button","lns-random","🎲 この条件からランダムで決める");
    rnd.onclick=function(){randomPick();};
    actions.appendChild(rnd);
    wrap.appendChild(actions);

    var picked=el("div","lns-picked");picked.id="lns-picked";picked.style.display="none";wrap.appendChild(picked);
    var count=el("div","lns-count");count.id="lns-count";wrap.appendChild(count);
    var list=el("div","lns-list");list.id="lns-list";wrap.appendChild(list);

    var note=el("p","lns-note","※ 評価・座標・営業時間はGoogleマップ由来の目安です。喫煙・入りやすさはこのアプリの利用者投稿で育つ項目で、実際と異なる場合があります。ご来店前に各店・Googleマップでご確認ください。");
    wrap.appendChild(note);
    root.appendChild(wrap);
    render();
  }
  function fieldRow(label,ctrl){var r=el("div","lns-frow");r.appendChild(el("span","lns-flabel",label));r.appendChild(ctrl);return r;}

  function filtered(){
    var out=DB.filter(function(d){
      if(d.modes.indexOf(state.mode)<0)return false;
      if(state.genre){var ok=d.genres.indexOf(state.genre)>=0;if(!ok)return false;}
      if(Object.keys(state.pl).some(function(k){return state.pl[k];})){if(!state.pl[d.pl])return false;}
      if(state.minR){if(!(d.rating>=state.minR))return false;}
      if(state.dist){if(d.dist==null||d.dist>state.dist)return false;}
      if(state.smoke){var a=aggCache[d.id];if(!a)return false;if(summ(a,"smoking").top!==state.smoke)return false;}
      if(state.ease){var b=aggCache[d.id];if(!b)return false;if(summ(b,"ease").top!==state.ease)return false;}
      return true;
    });
    out.sort(function(a,b){return (a.dist==null?1e9:a.dist)-(b.dist==null?1e9:b.dist);});
    return out;
  }

  function render(){
    var ids=DB.filter(function(d){return d.modes.indexOf(state.mode)>=0&&d.id;}).map(function(d){return d.id;});
    loadAgg(ids,function(){paint();});
    paint();
  }
  function paint(){
    var list=document.getElementById("lns-list");if(!list)return;
    var arr=filtered();
    document.getElementById("lns-count").textContent=arr.length+"件";
    list.innerHTML="";
    if(!arr.length){list.appendChild(el("div","lns-empty","条件に合うお店が見つかりませんでした。条件をゆるめてみてください。"));return;}
    arr.forEach(function(d){list.appendChild(card(d));});
  }

  function card(d){
    var c=el("div","lns-card");c.dataset.id=d.id||d.name;
    var top=el("div","lns-ctop");
    top.appendChild(el("div","lns-cname",esc(d.name)));
    if(d.rating!=null)top.appendChild(el("div","lns-crate","★"+d.rating+" <small>("+d.count+")</small>"));
    c.appendChild(top);
    var meta=el("div","lns-meta");
    (d.genres||[]).slice(0,3).forEach(function(g){meta.appendChild(el("span","lns-tag",esc(g)));});
    c.appendChild(meta);
    var rows=el("div","lns-rows");
    if(d.dist!=null)rows.appendChild(el("div","lns-r","📍 "+walk(d.dist)));
    if(d.price)rows.appendChild(el("div","lns-r","💴 "+esc(d.price)));
    if(d.hours)rows.appendChild(el("div","lns-r","🕒 "+esc(d.hours)));
    c.appendChild(rows);
    // crowdsource blocks
    c.appendChild(voteBlock(d,"smoking","喫煙",SM,{"可":"可","分煙":"分煙","不可":"不可"}));
    c.appendChild(voteBlock(d,"ease","入りやすさ",EA,{"入りやすい":"入りやすい","ふつう":"ふつう","並ぶ":"並ぶ"}));
    // actions
    var acts=el("div","lns-acts");
    var q=encodeURIComponent(d.id?d.name:d.name+" 西新宿");
    var mapurl="https://www.google.com/maps/search/?api=1&query="+q+(d.id?"&query_place_id="+d.id:"");
    var a1=el("a","lns-act","🗺️ 地図");a1.href=mapurl;a1.target="_blank";a1.rel="noopener";acts.appendChild(a1);
    if(d.phone){var a2=el("a","lns-act","📞 電話");a2.href="tel:"+d.phone;acts.appendChild(a2);}
    c.appendChild(acts);
    return c;
  }

  function voteBlock(d,field,label,opts){
    var id=d.id;var wrap=el("div","lns-vote");
    var ag=id?(aggCache[id]||blankAgg()):blankAgg();
    var s=summ(ag,field);
    wrap.appendChild(el("span","lns-vlabel",label+"："));
    wrap.appendChild(el("span","lns-vsum"+(s.top?" lns-vhas":""),esc(s.txt)));
    if(!id){return wrap;}
    var mine=hasVoted(id,field);
    var btns=el("div","lns-vbtns");
    opts.forEach(function(v){
      var b=el("button","lns-vb"+(mine===v?" lns-vmine":""),esc(v));
      if(mine){b.disabled=true;}
      b.onclick=function(){vote(id,field,v,function(){paint();});};
      btns.appendChild(b);
    });
    wrap.appendChild(btns);
    return wrap;
  }

  function randomPick(){
    var arr=filtered();var box=document.getElementById("lns-picked");
    if(!arr.length){box.style.display="none";return;}
    box.style.display="";
    var i=0,spins=14;
    var iv=setInterval(function(){
      var d=arr[Math.floor(Math.random()*arr.length)];
      box.innerHTML="<span class='lns-plabel'>🎲 抽選中…</span><span class='lns-pname'>"+esc(d.name)+"</span>";
      if(++i>=spins){clearInterval(iv);
        var pick=arr[Math.floor(Math.random()*arr.length)];
        var q=encodeURIComponent(pick.id?pick.name:pick.name+" 西新宿");
        var mapurl="https://www.google.com/maps/search/?api=1&query="+q+(pick.id?"&query_place_id="+pick.id:"");
        box.innerHTML="<span class='lns-plabel'>🎲 今日はここ！</span><span class='lns-pname'>"+esc(pick.name)+"</span>"+
          "<a class='lns-pmap' target='_blank' rel='noopener' href='"+mapurl+"'>🗺️ 地図でひらく</a>";
        try{box.scrollIntoView({behavior:"smooth",block:"center"});}catch(e){}
      }
    },70);
  }

  // expose init
  var built=false;
  window.__lnsRenderSearch=function(){root=document.getElementById("app-search");if(!root)return;if(!built){built=true;build();}else{render();}};
})();
</script>
</body>
